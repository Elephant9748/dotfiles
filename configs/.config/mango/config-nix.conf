# More option see https://github.com/DreamMaoMao/mango/wiki/

# monitor
monitorrule=name:^Virtual-1,width:1920,height:1024,refresh:60,x:0,y=0,scale:1 # for virtual machine
# monitorrule=name:^HDMI-A-1,width:1920,height:1080,refresh:60,x:0,y=0,scale:1 # for real monitor
# allow game to bypass the compositors VSync for lower latency
# allow_tearing=1
# autostart
exec-once=~/.config/mango/autostart.sh

# Window effect
blur=0
blur_layer=0
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

border_radius=2
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=none
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0

# Overview Setting
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=0
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=16
cursor_theme=breeze_cursors
drag_tile_to_tile=1
drag_tile_small=1

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=2
gappiv=2
gappoh=4
gappov=2
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=1
rootcolor=0x201b14ff
bordercolor=0x595959ff
dropcolor=0x8FBA7C55
focuscolor=0xb76110ff # default
# focuscolor=0x206469ff
maximizescreencolor=0x89aa61ff
urgentcolor=0xad401fff
scratchpadcolor=0x516c93ff
# globalcolor=0xb153a7ff
globalcolor=0xb76110ff
overlaycolor=0x14a57cff

# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=SUPER+SHIFT,r,reload_config

# menu, terminal, & other
bind=SUPER,p,spawn,rofi -opacity 80 -show drun
bind=SUPER+SHIFT,p,spawn,rofi -show power-menu -modi "power-menu:rofi-power-menu --choices=shutdown/lockscreen/logout/reboot"
bind=SUPER,c,spawn, rofi -show calc -modi calc -no-show-match -no-sort -no-history -calc-command "echo '{result}' | wl-copy"
bind=SUPER,t,spawn,alacritty
bind=SUPER+SHIFT,o,spawn,hyprpicker -a --format=hex
bind=SUPER,e,spawn, thunar
bind=SUPER,b,spawn_shell, waybar -c ~/.config/waybar/mango-config -s ~/.config/waybar/mango-style.css &
bind=SUPER+SHIFT,b,spawn, pkill waybar
bind=SUPER+SHIFT,x,spawn_shell, grim -g "$(slurp)" - | swappy -f -
bind=SUPER,w,spawn, wl-copy -c

bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SINK@ toggle
bind=SHIFT,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SOURCE@ toggle

windowrule=appid:localsend,isfloating:1,width:385,height:660,offsetx:978,offsety:87,animation_type_close:none,isglobal:1
windowrule=tags:2,appid:Alacritty
windowrule=tags:1,appid:org.qutebrowser.qutebrowser
windowrule=tags:1,appid:firefox-developer-edition
windowrule=tags:3,appid:Mullvad Browser Alpha
windowrule=tags:3,appid:chromium
windowrule=tags:3,appid:jetbrains-studio
windowrule=tags:4,appid:virt-manager
windowrule=tags:4,appid:org.gnome.Nautilus
windowrule=tags:4,appid:thunar
windowrule=tags:4,appid:Tor Browser Alpha
windowrule=title:Picture-in-Picture,isfloating:1,width:625,height:357,offsetx:1273,offsety:33,animation_type_close:none,isglobal:1
windowrule=appid:Raspberry Pi Imager,isfloating:1,width:612,height:534,offsetx:8,offsety:99,animation_type_close:none,isglobal:1,animation_type_close:none
windowrule=tags:6,title:Nextcloud,isfloating:1,width:389,height:1054,offsetx:99
windowrule=tags:6,title:Nextcloud Settings,isfloating:1,width:389,height:1054,offsetx:25
windowrule=appid:Cryptomator,isfloating:1,width:650,height:537,offsetx:99,offsety:99,animation_type_close:none,isglobal:1
# # qemu rule
windowrule=tags:4,appid:qemu-system-x86_64,layer_name:tile
# # signal windowrules
windowrule=title:Signal,isfloating:1,width:684,height:830,offsetx:99,offsety:99,animation_type_close:none
# # steam windowrules
windowrule=appid:steam,isfloating:1,width:1024,height:660,animation_type_close:none
# # scrcpy
windowrule=appid:scrcpy,isfloating:1,width:454,height:984,offsetx:99,isglobal:1
# # Gnome calculator
windowrule=appid:org.gnome.Calculator,isfloating:1,width:360,height:616,offsetx:99,offsety:98,isglobal:1,animation_type_close:none
# # Veracrypt
windowrule=appid:veracrypt,isfloating:1,width:584,height:553,animation_type_close:none
# # disks
windowrule=appid:org.gnome.DiskUtility,isfloating:1,isglobal:1,width:592,height:598,animation_type_close:none,offsetx:99,offsety:99

# # tag 6 rules
# todo()! for gap in specific tag
# workspace = 6, gapsout:50 394 50 50, gapsin:5

# layer rule
layerrule=noanim:1,noblur:1,layer_name:rofi
layerrule=noanim:1,noblur:1,layer_name:rofi

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,no_hide:1,layout_name:dwindle
tagrule=id:2,no_hide:2,layout_name:dwindle
tagrule=id:3,no_hide:3,layout_name:tile
tagrule=id:4,no_hide:4,layout_name:tile
tagrule=id:5,no_hide:5,layout_name:tile
tagrule=id:6,no_hide:6,layout_name:tile
tagrule=id:7,no_hide:7,layout_name:tile

# exit
bind=SUPER+SHIFT,q,quit
bind=SUPER+SHIFT,c,killclient,

# switch window focus
bind=SUPER,Tab,focusstack,next
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,k,focusdir,up
bind=SUPER,j,focusdir,down

# swap window
bind=SUPER+SHIFT,j,exchange_client,up
bind=SUPER+SHIFT,k,exchange_client,down
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right

# switch window status
bind=SUPER,g,toggleglobal,
bind=ALT,Tab,toggleoverview,
bind=SUPER+SHIFT,s,togglefloating,
bind=ALT,a,togglemaximizescreen,
bind=ALT,f,togglefullscreen,
bind=ALT+SHIFT,f,togglefakefullscreen,
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
bind=ALT,z,toggle_scratchpad

# scroller layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,

# switch layout
bind=SUPER,n,switch_layout
bind=ALT,t,setlayout,tile
bind=ALT,s,setlayout,scroller

# Example dwindle configuration
dwindle_split_ratio=0.5
dwindle_smart_split=0
dwindle_hsplit=0
dwindle_vsplit=0
dwindle_preserve_split=0
dwindle_smart_resize=0
dwindle_drop_simple_split=1

# tag switch
bind=SUPER,Left,viewtoleft,0
bind=CTRL,Left,viewtoleft_have_client,0
bind=SUPER,Right,viewtoright,0
bind=CTRL,Right,viewtoright_have_client,0
bind=CTRL+SUPER,Left,tagtoleft,0
bind=CTRL+SUPER,Right,tagtoright,0

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bindr=SUPER,2,spawn_shell, pkill swaybg; swaybg -i ~/Pictures/wallhaven.cc/ii.png
bind=SUPER,3,view,3,0
bindr=SUPER,3,spawn_shell, pkill swaybg; swaybg -i ~/Pictures/wallhaven.cc/viia.png
bind=SUPER,4,view,4,0
bindr=SUPER,4,spawn_shell, pkill swaybg; swaybg -i ~/Pictures/wallhaven.cc/iv.png
bind=SUPER,5,view,5,0
bindr=SUPER,5,spawn_shell, pkill swaybg; swaybg -i ~/Pictures/wallhaven.cc/viic.png
bind=SUPER,6,view,6,0
bindr=SUPER,6,spawn_shell, pkill swaybg; swaybg -i ~/Pictures/wallhaven.cc/iib.png
bind=SUPER,7,view,7,0
bindr=SUPER,7,spawn_shell, pkill swaybg; swaybg -i ~/Pictures/wallhaven.cc/iii.png

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# monitor switch
bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right
bind=SUPER+Alt,Left,tagmon,left
bind=SUPER+Alt,Right,tagmon,right

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

# movewin
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

# resizewin
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=SUPER,btn_left,moveresize,curmove
# mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize

# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

